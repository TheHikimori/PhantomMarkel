# Настройки времени (в тиках)
settings:
  spawn-start-time: 12300 # Когда можно начинать спавнить (вечер)
  despawn-time-start: 0   # Начало удаления (рассвет)
  despawn-time-end: 1000  # Конец окна удаления

# Сообщения
messages:
  no-permission: "&c&l[!] &cУ вас нет прав на использование этой команды!"
  only-at-night: "&c&l[!] &cПризраки являются только под покровом ночи..."
  merchant-spawned: "&a&l[!] &fПризрачный торговец материализовался из тумана."
  merchants-killed: "&e&l[!] &fВсе призрачные торговцы были изгнаны (удалено: %count%)"
  reload-success: "&a&l[!] &fКонфигурация успешно перезагружена!"

# Логирование
logging:
  enabled: true
  file-name: "purchases.log"

